name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Assertions
        - Providers / Adapters
        - CLI
        - Reporting
        - Caching
        - CI/CD Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: "What problem does this solve? Why do you need it?"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / API
      description: "How should this work? Sketch the config, CLI flag, or code you imagine."
      render: js
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "What else did you try or think about?"

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this
